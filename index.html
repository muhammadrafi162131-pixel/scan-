<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scan Wajah</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #e9ecef; 
            margin: 0;
            padding-top: 40px; 
        }
        .container { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #f8f9fa; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        h2 { margin-bottom: 5px; color: #333; font-size: 24px; }
        .sub-title { color: #6c757d; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        /* Kotak Bingkai Kamera Mirip di Screenshot */
        .camera-box {
            background-color: black;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .camera-inside {
            border: 2px solid #6c757d;
            border-radius: 10px;
            overflow: hidden;
            width: 350px;
            height: 200px; /* Diatur agak lebar menyamping sesuai kotak bidik */
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .camera-inside canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* Status Section */
        .status-container { margin: 15px 0; }
        .icon-cam { font-size: 24px; margin-bottom: 5px; display: block; }
        #label-container { font-size: 16px; font-weight: bold; color: #495057; }
        
        /* Warna tulisan dinamis */
        .match { color: #28a745 !important; }
        .stranger { color: #dc3545 !important; }

        /* Riwayat Kotak Bawah */
        .history-box {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            text-align: left;
            margin-top: 20px;
            border: 1px solid #dee2e6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
            font-size: 15px;
            border-bottom: 1px solid #f1f3f5;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .history-count { font-size: 12px; color: #6c757d; }
        #history-list { list-style: none; padding: 0; margin: 0; font-size: 14px; color: #495057; max-height: 100px; overflow-y: auto; }
        #history-list li { padding: 4px 0; border-bottom: 1px dashed #f1f3f5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Scan Wajah</h2>
    <p class="sub-title">Arahkan wajah Anda ke dalam kotak bidik</p>
    
    <div class="camera-box">
        <div class="camera-inside" id="webcam-container">
            </div>
    </div>
    
    <div class="status-container">
        <span class="icon-cam">📷</span>
        <div id="label-container">Mengaktifkan kamera...</div>
    </div>
    
    <div class="history-box">
        <div class="history-header">
            <span>Riwayat Scan Berhasil</span>
            <span class="history-count">Total: <span id="total-scan">0</span></span>
        </div>
        <ul id="history-list">
            </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // Link Teachable Machine milikmu
    const URL_MODEL = "https://teachablemachine.withgoogle.com/models/oHOHxZyqo/";

    let model, webcam, labelContainer, totalScanElement, historyList;
    let totalScan = 0;
    let isCooldown = false; // Mencegah spam absensi berulang-ulang dalam 1 detik

    async function init() {
        labelContainer = document.getElementById("label-container");
        totalScanElement = document.getElementById("total-scan");
        historyList = document.getElementById("history-list");

        try {
            const modelURL = URL_MODEL + "model.json";
            const metadataURL = URL_MODEL + "metadata.json";

            labelContainer.innerHTML = "Memuat model wajah...";
            model = await tmImage.load(modelURL, metadataURL);
            
            labelContainer.innerHTML = "Membuka kamera...";
            const flip = true; 
            
            // Set ukuran webcam agar pas di dalam kotak bidik
            webcam = new tmImage.Webcam(350, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Masukkan canvas kamera ke dalam kotak bidik hitam
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer.innerHTML = "Mencari wajah...";
        } catch (err) {
            labelContainer.innerHTML = "<span class='stranger'>Gagal mengaktifkan kamera. Pastikan klik 'Allow' di pojok kiri atas!</span>";
            console.error(err);
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        let scoreSiswa = prediction[0].probability;
        let namaSiswa = prediction[0].className;
        let scoreOrangLain = prediction[1] ? prediction[1].probability : 0;

        // Jika wajah kamu terdeteksi di atas 85%
        if (scoreSiswa > 0.85) {
            labelContainer.innerHTML = `<span class="match">Scan Berhasil! Selamat Datang, ${namaSiswa}</span>`;
            
            // Catat ke riwayat jika sedang tidak cooldown
            if (!isCooldown) {
                tambahRiwayat(namaSiswa);
            }
        } else if (scoreOrangLain > 0.85) {
            labelContainer.innerHTML = `<span class="stranger">Scan Gagal! Anda Terdeteksi sebagai ORANG LAIN</span>`;
        } else {
            labelContainer.innerHTML = "Menyelaraskan wajah...";
            labelContainer.className = "";
        }
    }

    function tambahRiwayat(nama) {
        isCooldown = true;
        totalScan++;
        totalScanElement.innerText = totalScan;

        // Ambil waktu saat ini
        const sekarang = new Date();
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        const detik = String(sekarang.getSeconds()).padStart(2, '0');

        // Buat baris baru di riwayat
        const li = document.createElement("li");
        li.innerHTML = `✅ <b>${nama}</b> berhasil absen pada pukul [${jam}:${menit}:${detik}]`;
        historyList.insertBefore(li, historyList.firstChild);

        // Beri jeda 3 detik sebelum bisa absen lagi agar tidak menumpuk dalam sekejap
        setTimeout(() => {
            isCooldown = false;
        }, 3000);
    }

    init();
</script>
</body>
</html>
