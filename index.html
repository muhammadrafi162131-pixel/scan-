<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scan Wajah</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #e9ecef; 
            margin: 0;
            padding-top: 40px; 
        }
        .container { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #f8f9fa; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        h2 { margin-bottom: 5px; color: #333; font-size: 24px; }
        .sub-title { color: #6c757d; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        .camera-box {
            background-color: black;
            border-radius: 15px;
            padding: 20px;
            display: inline-block;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .camera-inside {
            border: 2px solid #6c757d;
            border-radius: 10px;
            overflow: hidden;
            width: 350px;
            height: 200px; 
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .camera-inside canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .status-container { margin: 15px 0; min-height: 80px; }
        .icon-status { font-size: 30px; margin-bottom: 5px; display: block; }
        #label-container { font-size: 18px; font-weight: bold; color: #495057; line-height: 1.4; }
        .sub-label { font-size: 13px; color: #6c757d; font-weight: normal; margin-top: 4px; display: block; }
        
        /* Pewarnaan Teks Status Utama */
        .match { color: #28a745 !important; }
        .warning { color: #ffc107 !important; }
        .stranger { color: #dc3545 !important; }
        
        /* Badge Riwayat Samping */
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; }
        .badge-hadir { background-color: #28a745; }
        .badge-telat { background-color: #ffc107; color: #212529; }
        .badge-alpa { background-color: #dc3545; }

        .history-box {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            text-align: left;
            margin-top: 20px;
            border: 1px solid #dee2e6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
            font-size: 15px;
            border-bottom: 1px solid #f1f3f5;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .history-count { font-size: 12px; color: #6c757d; }
        #history-list { list-style: none; padding: 0; margin: 0; font-size: 14px; color: #495057; max-height: 150px; overflow-y: auto; }
        #history-list li { padding: 6px 0; border-bottom: 1px dashed #f1f3f5; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Scan Wajah</h2>
    <p class="sub-title">Arahkan wajah Anda ke dalam kotak bidik</p>
    
    <div class="camera-box">
        <div class="camera-inside" id="webcam-container"></div>
    </div>
    
    <div class="status-container">
        <span id="status-icon" class="icon-status">📷</span>
        <div id="label-container">Mengaktifkan kamera...</div>
    </div>
    
    <div class="history-box">
        <div class="history-header">
            <span>Riwayat Scan Berhasil</span>
            <span class="history-count">Total: <span id="total-scan">0</span></span>
        </div>
        <ul id="history-list">
            </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL_MODEL = "https://teachablemachine.withgoogle.com/models/oHOHxZyqo/";

    let model, webcam, labelContainer, statusIcon, totalScanElement, historyList;
    let totalScan = 0;
    let isCooldown = false; 

    // ⏱️ KONDISI WAKTU (Karena kamu uji coba siang hari, batas saya naikkan agar tidak langsung Alpa)
    const JAM_MASUK_MAKSIMAL = 7:00;   // Batas Tepat Waktu sebelum jam 07:00 siang
    const MENIT_MASUK_MAKSIMAL = 5; 

    const JAM_BATAS_TELAT = 7:05;      // Batas Terlambat sebelum jam 07:05 siang (Lewat jam 07:05 = Alpa)
    const MENIT_BATAS_TELAT = 5;

    async function init() {
        labelContainer = document.getElementById("label-container");
        statusIcon = document.getElementById("status-icon");
        totalScanElement = document.getElementById("total-scan");
        historyList = document.getElementById("history-list");

        try {
           const URL_MODEL = "https://teachablemachine.withgoogle.com/models/oHOHxZyqo/";
            const metadataURL = URL_MODEL + "metadata.json";

            labelContainer.innerHTML = "Memuat model wajah...";
            model = await tmImage.load(modelURL, metadataURL);
            
            webcam = new tmImage.Webcam(350, 200, true); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer.innerHTML = "Mencari wajah...";
        } catch (err) {
            labelContainer.innerHTML = "<span class='stranger'>Gagal mengaktifkan kamera.</span>";
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        let scoreSiswa = prediction[0].probability;
        let namaSiswa = prediction[0].Rafi;
        let scoreOrangLain = prediction[1] ? prediction[1].probability : 0;

        if (scoreSiswa > 0.85) {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const menit = sekarang.getMinutes();
            const detik = String(sekarang.getSeconds()).padStart(2, '0');
            const waktuTeks = `${String(jam).padStart(2, '0')}:${String(menit).padStart(2, '0')}:${detik}`;
            
            let statusKehadiran = "";
            let badgeClass = "";
            let textClass = "";

            // Logika Evaluasi Jam Masuk
            if (jam < JAM_MASUK_MAKSIMAL || (jam === JAM_MASUK_MAKSIMAL & menit <= MENIT_MASUK_MAKSIMAL)) {
                statusKehadiran = "HADIR (Tepat Waktu)";
                badgeClass = "badge-hadir";
                textClass = "match";
                statusIcon.innerText = "✅";
            } else if (jam < JAM_BATAS_TELAT || (jam === JAM_BATAS_TELAT & menit <= MENIT_BATAS_TELAT)) {
                statusKehadiran = "TELAT";
                badgeClass = "badge-telat";
                textClass = "warning";
                statusIcon.innerText = "⚠️";
            } else {
                statusKehadiran = "ALPA (Terlalu Lambat)";
                badgeClass = "badge-alpa";
                textClass = "stranger";
                statusIcon.innerText = "❌";
            }

            // Menampilkan keterangan tepat di bawah kamera
            labelContainer.innerHTML = `
                <span class="${textClass}">WAJAH COCOK!</span>
                <span class="sub-label">Scan berhasil pukul ${waktuTeks} (${statusKehadiran})</span>
            `;
            
            if (!isCooldown) {
                tambahRiwayat(namaSiswa, statusKehadiran, badgeClass, waktuTeks);
            }
        } else if (scoreOrangLain > 0.85) {
            statusIcon.innerText = "❌";
            labelContainer.innerHTML = `
                <span class="stranger">WAJAH TIDAK COCOK!</span>
                <span class="sub-label">Terdeteksi sebagai orang lain / tidak dikenal.</span>
            `;
        } else {
            statusIcon.innerText = "📷";
            labelContainer.innerHTML = "Menyelaraskan wajah...";
        }
    }

    function tambahRiwayat(nama, status, badge, waktu) {
        isCooldown = true;
        totalScan++;
        totalScanElement.innerText = totalScan;

        const li = document.createElement("li");
        li.innerHTML = `
            <span>Scan #${totalScan} — Wajah Terverifikasi (${waktu})</span>
            <span class="badge ${badge}">${status}</span>
        `;
        historyList.insertBefore(li, historyList.firstChild);

        // Cooldown 5 detik agar tidak mencatat data dobel dalam satu waktu yang sama
        setTimeout(() => {
            isCooldown = false;
        }, 5000);
    }

    init();
</script>
</body>
</html>
